services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama_local
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui_local
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_AUTH=false
      # Enable web search:
      - ENABLE_WEB_SEARCH=true       
      - ENABLE_TOOLS=false           
      - ENABLE_RAG=false
      - MAX_WEB_SEARCH_RESULTS=15
      - WEB_SEARCH_TIMEOUT=10
      - SYSTEM_MESSAGE= "Respond as a biomedical research specialist. Ajoutez toujours:\ [VERIFY ON PUBMED oor GOOGLE SCHOLAR] to support claims."
    volumes:
      - openwebui_data:/app/backend/data
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  ollama_data:
  openwebui_data: