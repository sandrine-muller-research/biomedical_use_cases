services:
  biomed-agent:
    build:
      context: ./openclaw-source
      dockerfile: Dockerfile
    image: openclaw-biomed:latest
    container_name: biomed-agent
    restart: unless-stopped
    ports:
      - "127.0.0.1:18789:18789"
    volumes:
      - ./workspace:/app/workspace
      - openclaw-config:/home/node/.openclaw
    environment:
      - AGENTS_ENABLED=true
      - TOOLS_FILE_READ=true
      - TOOLS_FILE_WRITE=true
      - TOOLS_SHELL=false
      - TOOLS_EXECUTE=false
      - TOOLS_NETWORK=false
      - TOOLS_BROWSER=false
      - SKILLS_ENABLED=false
volumes:
  openclaw-config:
